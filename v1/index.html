<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tack för din förfrågan — Ampy</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- decorative aurora corner art (recolored to teal/aurora) -->
  <img class="aurora aurora--top" src="assets/aurora-top.svg" alt="" aria-hidden="true">
  <img class="aurora aurora--bottom" src="assets/aurora-bottom.svg" alt="" aria-hidden="true">

  <main class="page">
    <div class="stack">

      <img class="logo" src="../shared/assets/Ampy-logo.png" alt="Ampy" width="701" height="201">

      <div class="intro">
        <!-- the current Ampy check (pale-mint disc + teal tick), animated: tick draws in -->
        <div class="check" aria-hidden="true">
          <span class="check__halo"></span>
          <svg class="check__svg" width="120" height="120" viewBox="0 0 174 174" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect class="check__disc" x="12" y="12" width="150" height="150" rx="75" fill="#55FF9A" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.18" stroke-width="24"/>
            <path class="check__tick" d="M118.582 66.3379L76.862 108.207L57.8984 89.1754" stroke="#00A991" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <header class="hero">
          <h1 class="hero__title">Din förfrågan har blivit mottagen!</h1>
          <p class="hero__sub">En av våra rådgivare kommer att kontakta dig inom kort.</p>
        </header>
      </div>

      <!-- trust card — 1:1 with the owner reference (dark, gold stars, centred) -->
      <section class="proof" aria-label="Omdöme och erfarenhet">
        <div class="proof__inner">
          <p class="proof__rating">
            <span class="stars" role="img" aria-label="5 av 5 i betyg på Google">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
            </span>
            <span class="proof__ratingtext"><strong>5 av 5</strong> · Betyg på Google</span>
          </p>
          <p class="proof__count"><strong>3&nbsp;000+</strong> genomförda installationer om året</p>
        </div>
      </section>

      <!-- while you wait — centred -->
      <a class="wait" href="https://ampy.se/elservice">
        <span class="wait__eyebrow">Medan du väntar</span>
        <span class="wait__line">Se allt vi kan hjälpa dig med hemma</span>
        <span class="wait__link">Utforska våra eltjänster
          <svg class="wait__arrow" viewBox="0 0 17 15" aria-hidden="true"><path d="M16.7071 8.07112C17.0976 7.68059 17.0976 7.04743 16.7071 6.65691L10.3431 0.292945C9.95262 -0.0975793 9.31946 -0.0975792 8.92893 0.292945C8.53841 0.683469 8.53841 1.31663 8.92893 1.70716L14.5858 7.36401L8.92893 13.0209C8.53841 13.4114 8.53841 14.0446 8.92893 14.4351C9.31946 14.8256 9.95262 14.8256 10.3431 14.4351L16.7071 8.07112ZM0 7.36401L8.74228e-08 8.36401L16 8.36401L16 7.36401L16 6.36401L-8.74228e-08 6.36401L0 7.36401Z"/></svg>
        </span>
      </a>

      <a class="ghost" href="https://ampy.se/">Till startsidan</a>

    </div>
  </main>
</body>
</html>
