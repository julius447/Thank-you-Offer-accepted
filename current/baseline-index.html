<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tack – Ampy</title>
<meta name="robots" content="noindex">
<!-- Outfit (Ampy body font). Self-host before production per FluentSnippets contract. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Faithful 1:1 rebuild of the current ampy.se /thank-you/ Bricks section.
       Source of truth: current/thank-you.bricks.json. This is the dev baseline to upgrade. -->
  <section class="ty-section">
    <div class="ty-card">
      <img class="ty-deco ty-deco--top" src="assets/thank-you-top.svg" alt="" aria-hidden="true">
      <img class="ty-deco ty-deco--bottom" src="assets/thank-you-bottom.svg" alt="" aria-hidden="true">

      <div class="ty-content">
        <img class="ty-icon" src="assets/thank-you-icon.svg" width="120" height="120" alt="">
        <div class="ty-text">
          <h1 class="ty-heading">Din förfrågan har blivit mottagen!</h1>
          <p class="ty-para">En av våra handläggare kommer att kontakta dig inom kort!</p>
        </div>
        <a class="ty-btn" href="https://ampy.se/">
          <span>Tillbaka till startsidan</span>
          <img class="ty-btn-icon" src="assets/Arrow-3.svg" width="16" alt="" aria-hidden="true">
        </a>
      </div>
    </div>
  </section>
</body>
</html>
