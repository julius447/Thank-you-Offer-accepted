<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tack — Ampy (C · Strukturerat kort)</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .page{ padding:clamp(2.4rem,4vw,4.8rem) var(--apspace-m); }
    .card{
      position:relative; z-index:1; width:100%; max-width:54rem;
      border-radius:var(--apradius-xl); overflow:hidden;
      background:var(--appure-white);
      border:1px solid rgba(255,255,255,.9);
      box-shadow:0 3rem 7rem rgba(9,11,50,.12);
    }
    /* zone 1 — the confirmation hero, on a soft mint wash */
    .card__top{
      display:flex; flex-direction:column; align-items:center; text-align:center;
      gap:clamp(1.6rem,2.2vw,2.2rem);
      padding:clamp(3.6rem,4.5vw,5.4rem) clamp(2.8rem,4vw,5rem) clamp(2.8rem,3.6vw,3.6rem);
      background:
        radial-gradient(120% 120% at 50% -20%, rgba(0,169,145,.10) 0%, rgba(0,169,145,0) 60%),
        radial-gradient(90% 90% at 50% 0%, rgba(160,251,201,.16) 0%, rgba(160,251,201,0) 55%);
    }
    .hero{ display:flex; flex-direction:column; gap:var(--apspace-s); }
    .hero__title{ white-space:nowrap; }
    .hero__sub{ white-space:nowrap; }
    /* zone 2 — quiet footer: proof + next step */
    .card__foot{
      display:flex; align-items:center; justify-content:space-between; gap:var(--apspace-l);
      padding:clamp(2rem,2.6vw,2.6rem) clamp(2.8rem,4vw,5rem);
      border-top:1px solid rgba(11,16,48,.08);
      background:rgba(245,249,255,.5);
    }
    .card__foot .proof{ align-items:flex-start; text-align:left; gap:.4rem; }
    .card__foot .proof__rating{ justify-content:flex-start; }
    .cta{
      flex:0 0 auto;
      display:inline-flex; align-items:center; gap:.7rem; text-decoration:none;
      padding:1.3rem 2.4rem; border-radius:var(--apradius-full);
      font-size:var(--aptext-sm); font-weight:600; color:#fff; white-space:nowrap;
      background:linear-gradient(135deg,#00b89c,#018271);
      box-shadow:0 1rem 2.2rem rgba(0,169,145,.28);
      transition:transform .2s var(--ease), box-shadow .2s var(--ease);
    }
    .cta:hover{ transform:translateY(-2px); box-shadow:0 1.5rem 2.8rem rgba(0,169,145,.36); }
    .cta svg{ width:1.4rem; height:1.3rem; fill:currentColor; transition:transform .2s var(--ease); }
    .cta:hover svg{ transform:translateX(3px); }
    .ghost{ position:relative; z-index:1; display:block; text-align:center; margin-top:2rem; }
    @media (max-width:560px){
      .card__foot{ flex-direction:column; align-items:center; text-align:center; gap:var(--apspace-m); padding:2.6rem 2.4rem; }
      .card__foot .proof{ align-items:center; text-align:center; }
      .card__foot .proof__rating{ justify-content:center; }
      .hero__title{ font-size:var(--aptext-xl); white-space:normal; text-wrap:balance; }
      .hero__sub{ font-size:var(--aptext-m); white-space:normal; text-wrap:balance; }
      .hero__title br, .hero__sub br{ display:none; }
    }
  </style>
</head>
<body>
  <img class="aurora aurora--top" src="../v1/assets/aurora-top.svg" alt="" aria-hidden="true">
  <img class="aurora aurora--bottom" src="../v1/assets/aurora-bottom.svg" alt="" aria-hidden="true">

  <main class="page">
    <div>
      <div class="card">
        <div class="card__top">
          <div class="check" aria-hidden="true">
            <span class="check__halo"></span>
            <svg class="check__svg" width="112" height="112" viewBox="0 0 174 174" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect class="check__disc" x="12" y="12" width="150" height="150" rx="75" fill="#55FF9A" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.18" stroke-width="24"/>
              <path class="check__tick" d="M118.582 66.3379L76.862 108.207L57.8984 89.1754" stroke="#00A991" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <header class="hero">
            <h1 class="hero__title">Din förfrågan har blivit <br>mottagen!</h1>
            <p class="hero__sub">En av våra rådgivare kommer att kontakta dig <br>inom kort.</p>
          </header>
        </div>
        <div class="card__foot">
          <div class="proof" aria-label="Omdöme och erfarenhet">
            <p class="proof__rating">
              <span class="stars" role="img" aria-label="5 av 5 i betyg på Google">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.784 1.401 8.166L12 18.896l-7.335 3.864 1.401-8.166L.132 9.21l8.2-1.192z"/></svg>
              </span>
              <span class="proof__ratingtext"><strong>5 av 5</strong> · Betyg på Google</span>
            </p>
            <p class="proof__count"><strong>3&nbsp;000+</strong> genomförda installationer om året</p>
          </div>
          <a class="cta" href="https://ampy.se/elservice">Utforska våra eltjänster
            <svg viewBox="0 0 17 15" aria-hidden="true"><path d="M16.7071 8.07112C17.0976 7.68059 17.0976 7.04743 16.7071 6.65691L10.3431 0.292945C9.95262 -0.0975793 9.31946 -0.0975792 8.92893 0.292945C8.53841 0.683469 8.53841 1.31663 8.92893 1.70716L14.5858 7.36401L8.92893 13.0209C8.53841 13.4114 8.53841 14.0446 8.92893 14.4351C9.31946 14.8256 9.95262 14.8256 10.3431 14.4351L16.7071 8.07112ZM0 7.36401L8.74228e-08 8.36401L16 8.36401L16 7.36401L16 6.36401L-8.74228e-08 6.36401L0 7.36401Z"/></svg>
          </a>
        </div>
      </div>
      <a class="ghost" href="https://ampy.se/">Till startsidan</a>
    </div>
  </main>
</body>
</html>
